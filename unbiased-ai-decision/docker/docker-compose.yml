version: '3.9'

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8080:8080"
    env_file:
      - ../.env
    volumes:
      - ../backend:/app

  flutter-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.flutter
      args:
        FLUTTER_API_BASE_URL: ${FLUTTER_API_BASE_URL:-http://localhost:8080}
    ports:
      - "${FLUTTER_WEB_PORT:-3000}:80"
    depends_on:
      - backend
